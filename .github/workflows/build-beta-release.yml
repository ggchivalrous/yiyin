name: Build Beta & Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      create_release:
        description: '构建 Release 包'
        required: false
        default: false
        type: boolean

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        arch: [x64, arm64]
    runs-on: ${{ matrix.os }}
    
    env:
      Project_Name: yiyin
       
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          # cache: 'npm' 暂时不使用 lock 文件，故注释

      - name: Install dependencies
        run: npm install

      - name: Determine Build Configuration
        id: config
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.create_release }}" == "true" ]]; then
            echo "BUILD_CONFIG=Release" >> $GITHUB_ENV
            echo "ARTIFACT_NAME=release" >> $GITHUB_ENV
          else
            echo "BUILD_CONFIG=Debug" >> $GITHUB_ENV
            echo "ARTIFACT_NAME=debug" >> $GITHUB_ENV
          fi

      - name: Build and Package
        shell: bash
        run: |
          npm run build
          if [ "$RUNNER_OS" == "Windows" ]; then
            npx electron-builder --win --${{ matrix.arch }} -p never
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npx electron-builder --mac --${{ matrix.arch }} -p never
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare and Zip Artifacts
        shell: pwsh
        run: |
          $osName = if ("${{ runner.os }}" -eq "Windows") { "win" } else { "mac" }
          $zipName = "${{ env.Project_Name }}-$osName-${{ matrix.arch }}-${{ env.ARTIFACT_NAME }}.zip"
          
          # Find the generated installer in dist folder
          if ("${{ runner.os }}" -eq "Windows") {
            $files = Get-ChildItem -Path dist/*.exe
          } else {
            $files = Get-ChildItem -Path dist/*.dmg
          }
          
          if ($files.Count -gt 0) {
            $installerPath = $files[0].FullName
            Compress-Archive -Path $installerPath -DestinationPath "$zipName"
            "ZIP_PATH=$zipName" | Add-Content -Path $env:GITHUB_ENV
            "ARTIFACT_DISPLAY_NAME=${{ env.Project_Name }}-$osName-${{ matrix.arch }}-${{ env.ARTIFACT_NAME }}" | Add-Content -Path $env:GITHUB_ENV
          } else {
            Write-Error "No installer found in dist folder"
            exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_DISPLAY_NAME }}
          path: ${{ env.ZIP_PATH }}
          retention-days: 30
